# ================================================================
# Ray-Axis — Nginx reverse proxy HTTPS
# Proxy le dashboard Flask avec TLS, auth basique, rate limiting
#
# Installation :
#   sudo cp nginx-siem.conf /etc/nginx/sites-available/ray-axis
#   sudo ln -s /etc/nginx/sites-available/ray-axis /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ================================================================

# Rate limiting pour le dashboard SOC
limit_req_zone  $binary_remote_addr zone=soc_global:10m rate=30r/s;
limit_req_zone  $binary_remote_addr zone=soc_login:10m  rate=5r/m;
limit_conn_zone $binary_remote_addr zone=soc_conn:10m;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # ── TLS ───────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/siem.crt;
    ssl_certificate_key /etc/nginx/ssl/siem.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Headers sécurité ──────────────────────────────────────
    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options           "DENY"             always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Content-Security-Policy   "default-src 'self' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com" always;

    # ── Logs structurés ───────────────────────────────────────
    access_log /var/log/nginx/ray-axis-access.log;
    error_log  /var/log/nginx/ray-axis-error.log warn;

    # ── Limites ───────────────────────────────────────────────
    limit_req  zone=soc_global burst=50 nodelay;
    limit_conn soc_conn 10;
    client_max_body_size 1M;

    # ── Dashboard Ray-Axis (Flask :5000) ─────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering    off;   # Pour le streaming temps réel
    }

    # ── API — rate limit strict ────────────────────────────────
    location /api/ {
        limit_req zone=soc_global burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Login ─────────────────────────────────────────────────
    location /login {
        limit_req zone=soc_login burst=2 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Bloquer les accès non autorisés ───────────────────────
    location ~ /\. {
        deny all;
    }
    location ~* \.(env|git|bak|sh|sql)$ {
        deny all;
    }

    # ── Health check interne ──────────────────────────────────
    location /nginx-status {
        allow 127.0.0.1;
        deny all;
        stub_status on;
    }
}
