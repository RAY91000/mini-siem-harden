version: "3.9"

# ================================================================
# Ray-Axis — Infrastructure client surveillée
# Stack : Nginx + Node.js + MySQL + Filebeat
# 3 réseaux isolés : frontend / backend / monitoring
#
# Usage :
#   SIEM_HOST=<IP-VM-KALI> docker-compose up -d
# ================================================================

networks:
  # Réseau public — Nginx uniquement exposé
  net-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24

  # Réseau interne — App ↔ DB uniquement
  net-backend:
    driver: bridge
    internal: true          # Pas d'accès internet depuis ce réseau
    ipam:
      config:
        - subnet: 172.20.2.0/24

  # Réseau monitoring — Filebeat → SIEM uniquement
  net-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.3.0/24

volumes:
  mysql-data:
  nginx-logs:
  app-logs:

services:

  # ── Nginx — reverse proxy web ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: client-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - net-frontend
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    # Pas d'accès réseau backend — Nginx ne voit pas la DB
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

  # ── Application Node.js ──────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: client-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=appuser
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=appdb
      - PORT=3000
    volumes:
      - app-logs:/app/logs
    networks:
      - net-frontend   # Reçoit les requêtes de Nginx
      - net-backend    # Parle à la DB
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    # L'app ne peut pas accéder à internet (net-backend est internal)
    # Elle est joignable depuis net-frontend via Nginx uniquement

  # ── MySQL ────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: client-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootchangeme}
      - MYSQL_DATABASE=appdb
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./mysql/mysql-audit.cnf:/etc/mysql/conf.d/audit.cnf:ro
    networks:
      - net-backend    # Uniquement joignable par l'app
    # Aucun port exposé à l'hôte — DB totalement interne
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootchangeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

  # ── Filebeat — agent de collecte logs ────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: client-filebeat
    restart: unless-stopped
    user: root   # Nécessaire pour lire les volumes de logs
    environment:
      - SIEM_HOST=${SIEM_HOST:-localhost}
      - SIEM_PORT=${SIEM_PORT:-5044}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./certs:/etc/filebeat/certs:ro
      - nginx-logs:/var/log/nginx:ro
      - app-logs:/var/log/app:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - net-monitoring  # Uniquement accès vers le SIEM
    depends_on:
      - nginx
      - app
    security_opt:
      - no-new-privileges:true
    command: filebeat -e --strict.perms=false

  # ── Attaquant (Kali tools) — réseau frontend uniquement ──────
  attacker:
    image: kalilinux/kali-rolling
    container_name: client-attacker
    restart: "no"
    profiles:
      - attack   # Démarré seulement avec : docker-compose --profile attack up attacker
    networks:
      - net-frontend   # Voit uniquement Nginx — pas la DB, pas le monitoring
    entrypoint: ["/bin/bash", "-c", "apt-get update -qq && apt-get install -y nmap hydra nikto sqlmap curl -qq && sleep infinity"]
    security_opt:
      - no-new-privileges:true
