# ================================================================
# Ray-Axis — Infrastructure client surveillée
# Stack : Nginx + Node.js + MySQL + Filebeat
# 3 réseaux isolés : frontend / backend / monitoring
#
# Usage :
#   $env:SIEM_HOST="10.1.0.152"; docker-compose up -d   (PowerShell)
#   SIEM_HOST=10.1.0.152 docker-compose up -d            (bash)
# ================================================================

networks:
  net-frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.1.0/24

  net-backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24

  net-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.3.0/24

volumes:
  mysql-data:
  nginx-logs:
  app-logs:

services:

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: client-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - net-frontend
    depends_on:
      - app
    security_opt:
      - no-new-privileges:true

  # ── Application Node.js ──────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: client-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=appuser
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=appdb
      - PORT=3000
    volumes:
      - app-logs:/app/logs
    networks:
      - net-frontend
      - net-backend
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  # ── MySQL ────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: client-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootchangeme}
      - MYSQL_DATABASE=appdb
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # mysql-audit.cnf retiré — cause des warnings "world-writable" sous Windows
      # À remettre sur Linux : - ./mysql/mysql-audit.cnf:/etc/mysql/conf.d/audit.cnf:ro
    networks:
      - net-backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootchangeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    cap_drop:
      - NET_ADMIN
      - SYS_ADMIN
    cap_add:
      - DAC_OVERRIDE
      - CHOWN
      - SETUID
      - SETGID

  # ── Filebeat ─────────────────────────────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: client-filebeat
    restart: unless-stopped
    user: root
    environment:
      - SIEM_HOST=${SIEM_HOST:-localhost}
      - SIEM_PORT=${SIEM_PORT:-5044}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - nginx-logs:/var/log/nginx:ro
      - app-logs:/var/log/app:ro
    networks:
      - net-monitoring
    depends_on:
      - nginx
      - app
    security_opt:
      - no-new-privileges:true
    command: filebeat -e --strict.perms=false

  # ── Attaquant (profil séparé) ─────────────────────────────────
  attacker:
    image: kalilinux/kali-rolling
    container_name: client-attacker
    restart: "no"
    profiles:
      - attack
    networks:
      - net-frontend
    entrypoint: ["/bin/bash", "-c", "apt-get update -qq && apt-get install -y nmap hydra nikto sqlmap curl -qq && sleep infinity"]