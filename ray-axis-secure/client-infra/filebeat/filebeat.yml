# ================================================================
# Ray-Axis — Configuration Filebeat
# TLS désactivé pour l'instant (activer après gen_certs.sh)
# ================================================================

filebeat.inputs:

  - type: log
    id: nginx-access
    enabled: true
    paths:
      - /var/log/nginx/access.log
    tags: ["nginx", "client-infra"]
    fields:
      source_type: nginx
      client: "docker-homelab"
    fields_under_root: false

  - type: log
    id: nginx-error
    enabled: true
    paths:
      - /var/log/nginx/error.log
    tags: ["nginx", "nginx-error"]
    fields:
      source_type: nginx_error

  - type: log
    id: app-logs
    enabled: true
    paths:
      - /var/log/app/*.log
    tags: ["nodejs", "application"]
    fields:
      source_type: app
    json.keys_under_root: true
    json.add_error_key: true

processors:
  - add_host_metadata: ~
  - drop_fields:
      fields: ["agent.ephemeral_id", "ecs.version"]
      ignore_missing: true

# ── Output vers Ray-Axis ──────────────────────────────────────
output.logstash:
  hosts: ["${SIEM_HOST:localhost}:${SIEM_PORT:5044}"]

  # TLS désactivé pour l'instant
  # Activer après avoir exécuté gen_certs.sh et copié les certs :
  # ssl.enabled: true
  # ssl.certificate_authorities: ["/etc/filebeat/certs/ca.crt"]
  # ssl.certificate:             "/etc/filebeat/certs/filebeat.crt"
  # ssl.key:                     "/etc/filebeat/certs/filebeat.key"
  # ssl.verification_mode:       "full"

  timeout: 30
  bulk_max_size: 2048

queue.mem:
  events: 4096
  flush.min_events: 512
  flush.timeout: 5s

logging.level: warning
logging.to_files: false
logging.metrics.enabled: false