# ================================================================
# Ray-Axis — Configuration Filebeat (agent client)
# Collecte les logs Nginx + App + MySQL et les envoie vers
# Ray-Axis via une connexion mTLS sécurisée
# ================================================================

filebeat.inputs:

  # ── Logs Nginx ───────────────────────────────────────────────
  - type: log
    id: nginx-access
    enabled: true
    paths:
      - /var/log/nginx/access.log
    tags: ["nginx", "client-infra"]
    fields:
      source_type: nginx
      client: "docker-homelab"
    fields_under_root: false
    json.keys_under_root: false
    multiline.pattern: '^\d{1,3}\.\d{1,3}'
    multiline.negate: true
    multiline.match: after

  - type: log
    id: nginx-error
    enabled: true
    paths:
      - /var/log/nginx/error.log
    tags: ["nginx", "nginx-error"]
    fields:
      source_type: nginx_error
    processors:
      - add_fields:
          fields:
            log_type: "error"

  # ── Logs application Node.js ─────────────────────────────────
  - type: log
    id: app-logs
    enabled: true
    paths:
      - /var/log/app/*.log
    tags: ["nodejs", "application"]
    fields:
      source_type: app
    json.keys_under_root: true
    json.add_error_key: true

  # ── Logs Docker containers ────────────────────────────────────
  - type: container
    id: docker-logs
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    tags: ["docker"]
    fields:
      source_type: docker
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"

# ── Processeurs globaux ───────────────────────────────────────
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - decode_json_fields:
      fields: ["message"]
      target: "json"
      overwrite_keys: true
      add_error_key: true
  # Supprimer les champs inutiles pour alléger le flux
  - drop_fields:
      fields: ["agent.ephemeral_id", "ecs.version"]
      ignore_missing: true

# ── Output vers Ray-Axis via mTLS ────────────────────────────
output.logstash:
  hosts: ["${SIEM_HOST:localhost}:${SIEM_PORT:5044}"]
  
  # Chiffrement TLS mutuel (mTLS)
  ssl.enabled: true
  ssl.certificate_authorities: ["/etc/filebeat/certs/ca.crt"]
  ssl.certificate:             "/etc/filebeat/certs/filebeat.crt"
  ssl.key:                     "/etc/filebeat/certs/filebeat.key"
  ssl.verification_mode:       "full"   # Vérifie le certificat du SIEM
  
  # Paramètres de connexion
  timeout: 30
  worker: 2
  bulk_max_size: 2048
  
  # Compression pour réduire la bande passante
  compression_level: 3

# ── Paramètres internes ───────────────────────────────────────
filebeat.registry.path: /usr/share/filebeat/data/registry

# Queue interne (buffer si le SIEM est momentanément indisponible)
queue.mem:
  events: 4096
  flush.min_events: 512
  flush.timeout: 5s

# Retry en cas d'échec
output.logstash.backoff.init: 1s
output.logstash.backoff.max: 60s

# ── Logs Filebeat lui-même ────────────────────────────────────
logging.level: warning
logging.to_files: false
logging.metrics.enabled: false
