user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logs structurés (parsables par Ray-Axis) ──────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performances ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── Sécurité de base ──────────────────────────────────────
    server_tokens off;                    # Cacher la version Nginx
    more_clear_headers Server;            # Supprimer header Server

    # ── Limites de taux (protection DDoS / brute force) ───────
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Headers de sécurité globaux ───────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin"        always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── SSL ───────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Bloquer les User-Agents d'outils d'attaque ────────────
    map $http_user_agent $bad_agent {
        default           0;
        ~*sqlmap          1;
        ~*nikto           1;
        ~*masscan         1;
        ~*nmap            1;
        ~*zgrab           1;
        ~*dirbuster       1;
        ~*gobuster        1;
        ~*wfuzz           1;
        ~*hydra           1;
        ~*(scanner|crawl) 1;
    }

    # ── Redirect HTTP → HTTPS ─────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Serveur principal HTTPS ───────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # Bloquer les mauvais agents
        if ($bad_agent) {
            return 403;
        }

        # Limites globales
        limit_req  zone=global burst=50 nodelay;
        limit_conn conn_limit 20;

        # ── Page d'accueil ────────────────────────────────────
        location / {
            proxy_pass         http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── API — limite stricte ──────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app:3000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Login — très limité ───────────────────────────────
        location /login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://app:3000;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Bloquer accès fichiers sensibles ──────────────────
        location ~* \.(env|git|sql|bak|conf|log|sh)$ {
            return 404;
        }
        location ~ /\. {
            return 404;
        }

        # ── Status pour healthcheck interne ──────────────────
        location /nginx-health {
            allow 172.20.0.0/16;
            deny all;
            return 200 "ok\n";
        }
    }
}
